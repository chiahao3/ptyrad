# tBL_WSe2

init_params : {
    # Experimental params
    'probe_kv'               : 80, # [kV]. Acceleration voltage
    'probe_conv_angle'       : 24.9, # [mrad]. Semi-convergence angle for probe-forming aperture
    'probe_aberrations'      : {'C10': 0}, # [Ang, degree]. Aberration coefficients in Krivanel polar notations. C10 = -df, and positive C10 refers to overfocus (stronger lens).    
    'meas_Npix'              : 128, # Detector pixel number, EMPAD is 128. Only supports square detector for simplicity
    'pos_N_scan_slow'        : 128, # Number of scan position along slow scan direction. Usually it's the vertical direction of acquisition GUI
    'pos_N_scan_fast'        : 128, # Number of scan position along fast scan direction. Usually it's the horizontal direction of acquisition GUI
    'pos_scan_step_size'     : 0.4290, # [Ang]. Step size between probe positions in a rectangular raster scan pattern
    # Model complexity
    'probe_pmode_max'        : 6, # Maximum number of mixed probe modes.
    'obj_Nlayer'             : 1, # Number of slices for multislice object
    'obj_slice_thickness'    : 12, # [Ang]. Slice thickness (propagation distance) for multislice ptychography. Typical values are between 1 to 20 Ang.
    # Preprocessing
    'meas_permute'           : null, # List of ints, which applies additional permutation (np.transpose) to reorder datasets into (N_scans, ky, kx).
    'meas_reshape'           : null, # List of 3 ints, commonly needed to convert the 4D diffraction dataset (Ry,Rx,ky,kx) into 3D (N_scans,ky,kx)
    'meas_flipT'             : [1,0,0], # type: null or list of 3 binary booleans (0 or 1) as [flipud, fliplr, transpose]
    'meas_crop'              : null, # Crop 4D dataset as [[scan_slow_start, scan_slow_end], [scan_fast_start, scan_fast_end], [ky_start, ky_end], [kx_start, kx_end]].
    'meas_pad'               : {'mode': null, 'padding_type': 'power', 'target_Npix': 256, 'value': 0, 'threshold': 70}, # Pad diffraction patterns to larger kMax
    'meas_resample'          : {'mode': null, 'scale_factors': [2,2]}, # Resample diffraction patterns
    # Data path
    'meas_params'            : {'path': 'data/tBL_WSe2/Panel_g-h_Themis/scan_x128_y128.raw'}, # Supports EMPAD .raw, .hdf5, .mat, and .tif
}

model_params : {
    'update_params':{
        'obja'            : {'start_iter': 1, 'lr': 5.0e-4, 'end_iter': null}, # object amplitude
        'objp'            : {'start_iter': 1, 'lr': 5.0e-4, 'end_iter': null}, # object phase
        'probe'           : {'start_iter': 1, 'lr': 1.0e-4, 'end_iter': null}, # probe
        'probe_pos_shifts': {'start_iter': 1, 'lr': 5.0e-4, 'end_iter': null}, # probe positions
    }
}

loss_params : {
    'loss_single': {'state': true, 'weight': 1.0, 'dp_pow': 0.5}, # Amplitude noise model for typical dataset (dose-sufficient) under the maximum-likelihood formalism
    'loss_poissn': {'state': false, 'weight': 1.0, 'dp_pow': 1.0, 'eps': 1.0e-6}, # Poisson noise model for low dose dataset under maximum likelihood formalism
    'loss_sparse': {'state': false, 'weight': 0.1, 'ln_order': 1}, # L_n norm sparsity regularization calculated for object phase ('objp')
}

constraint_params : {
    'ortho_pmode'   : {'start_iter': 1,    'step': 1, 'end_iter': null}, # Orthogonalize the mixed-state probe
    'fix_probe_int' : {'start_iter': 1,    'step': 1, 'end_iter': null}, # Fix the probe intensity to remove the object-probe intensity ambiguity
    'obj_rblur'     : {'start_iter': 1,    'step': 1, 'end_iter': null, 'obj_type': 'both', 'kernel_size': 5, 'std': 0.4}, # Apply a "lateral" 2D Gaussian blur to the object
    'obj_zblur'     : {'start_iter': 1,    'step': 1, 'end_iter': null, 'obj_type': 'both', 'kernel_size': 5, 'std': 1}, # Apply a "z-direction" 1D Gaussian blur to the object
    'obj_z_recenter': {'start_iter': null, 'step': 1, 'end_iter': null, 'thresh': 95, 'scale': 1, 'max_shift': 10}, # Recentering object along depth based on 1D CoM
    'obja_thresh'   : {'start_iter': null, 'step': 1, 'end_iter': null, 'relax': 0, 'thresh': [0.96, 1.04]}, # Apply a thresholding of object amplitude
    'objp_postiv'   : {'start_iter': null, 'step': 1, 'end_iter': null, 'relax': 0}, # Apply a positivity constraint of the object phase by clipping negative values
}

recon_params: {
    'NITER': 200, # Total number of reconstruction iterations. 1 iteration means a full pass of all selected diffraction patterns.
    'BATCH_SIZE': {'size': 32, 'grad_accumulation': 1}, # Number of diffraction patterns processed simultaneously to get the gradient update.
    'SAVE_ITERS': 10, # Number of completed iterations before saving the current reconstruction results (model, probe, object) and summary figures.
    'output_dir': 'output/tBL_WSe2/',
    'prefix': '', # Prefix this string to the reconstruction folder name. Note that a "_" will be automatically generated.
    'postfix': '', # Postfix this string to the reconstruction folder name. Note that a "_" will be automatically generated.
    'compiler_configs': {'enable': false}, # Set to {'enable': true} to enable PyTorch JIT compilation for a 1.3-1.9x speedup on supported hardware.
}