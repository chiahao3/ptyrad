# Created with PtyRAD 0.1.0b13
# Documentation: https://ptyrad.readthedocs.io/en/latest/
# Detailed description for each option: https://ptyrad.readthedocs.io/en/latest/_autosummary/ptyrad.params.html

# Pad vacuum layers to previous reconstructions and resume reconstructions

# tBL_WSe2

init_params:
    # Experimental params
    probe_kv               : 80 # [kV] Acceleration voltage
    probe_conv_angle       : 24.9 # [mrad] Semi-convergence angle for probe-forming aperture
    probe_aberrations      : {'C10': 0} # [Angstrom, degree] Aberration coefficients in Krivanel polar notations. C10 = -df, and positive C10 refers to overfocus (stronger lens).  
    meas_Npix              : 128 # Detector pixel number, EMPAD is 128. Only supports square detector for simplicity
    pos_N_scan_slow        : 128 # Number of scan position along slow scan direction. Usually it's the vertical direction of acquisition GUI
    pos_N_scan_fast        : 128 # Number of scan position along fast scan direction. Usually it's the horizontal direction of acquisition GUI
    pos_scan_step_size     : 0.4290 # [Angstrom] Step size between probe positions in a rectangular raster scan pattern
    # Model complexity
    probe_pmode_max        : 6 # Maximum number of mixed probe modes
    obj_Nlayer             : 6 # Number of slices for multislice object
    obj_slice_thickness    : 2 # [Angstrom] Slice thickness (propagation distance) for multislice ptychography. Typical values are between 1 to 20 Ang.
    # Preprocessing
    meas_permute           : null # Permute meas array with a list of ints to reorder datasets into (N_scans, ky, kx) if needed.
    meas_reshape           : null # Reshape meas array with a list of 3 ints to convert the 4D diffraction dataset (Ry,Rx,ky,kx) into 3D (N_scans,ky,kx) for PtyRAD.
    meas_flipT             : [1,0,0] # Flip meas orientation with a list of 3 binary booleans (0 or 1) as [flipud, fliplr, transpose]
    pos_scan_affine        : null # Affine transformation [scale, asymmetry, rotation, shear] of scan patterns. e.g, [1,0,3,0], rotation and shear are in unit of degree.
    
    ## NOTE: You can pad more layers to the loaded object along depth, and padding vacuum is the most common usage.
    ##       You can change 'pad_layers' to achieve asymmetric padding to better center your object,
    ##       or use 'pad_types' to pad 'vacuum', 'edge', or 'mean' layers. Padding 'mean' layer can be used to quickly explore total thickness.
    ##       obj_z_pad often requires to use with probe_z_shift so the relative axial alignment of probe and object is conserved.
    ##       Because the probe array interacts with the entrance plane of the object, and padding ON TOP changes that entrace plane.
    ##       For example, if you pad 20 Ang of vacuum ON TOP of the current object, you'll need to apply probe_z_shift: -20 Ang.
    ##       This rewinds the probe backward by 20 Ang, so when the probe passes through the 20 Ang vacuum padded on top of the current object,
    ##       it will remain the same level of defocus while interacting with the object.
    obj_z_pad              : {'pad_layers': [2,2], 'pad_types': ['vacuum', 'vacuum']} # Pad the 4D object (omode, Nz, Ny, Nx) along depth dimension (Nz) and expands the object thickness.
    probe_z_shift          : -20 # Shifts the initialized probe axially along the depth (z) dimension. Positive value means to propagate the probe further into the object (i.e., forward direction).

    # Input source and params
    meas_params            : {'path': 'data/tBL_WSe2/Panel_g-h_Themis/scan_x128_y128.raw', 'key': null} # Supports EMPAD .raw, .hdf5, .mat, and .tif
    probe_source           : 'PtyRAD' # Data source of the probe. Currently supporting 'simu', 'PtyRAD', 'PtyShv', 'py4DSTEM', and 'custom'
    probe_params           : 'output/tBL_WSe2/20260205_full_N16384_dp128_flipT100_random32_p6_1obj_6slice_dz2/model_iter0200.hdf5' # Provide a str path of 'path/to/reconstruction_model.hdf5'
    pos_source             : 'PtyRAD' # Data source of the probe positions. Currently supporting 'simu', 'PtyRAD', 'PtyShv', 'py4DSTEM', 'foldslice_hdf5', and 'custom'
    pos_params             : 'output/tBL_WSe2/20260205_full_N16384_dp128_flipT100_random32_p6_1obj_6slice_dz2/model_iter0200.hdf5' # Provide a str path of 'path/to/reconstruction_model.hdf5'
    obj_source             : 'PtyRAD' # Data source of the object. Currently supporting 'simu', 'PtyRAD', 'PtyShv', 'py4DSTEM', and 'custom'
    obj_params             : 'output/tBL_WSe2/20260205_full_N16384_dp128_flipT100_random32_p6_1obj_6slice_dz2/model_iter0200.hdf5' # Provide a str path of 'path/to/reconstruction_model.hdf5'

loss_params:
    loss_single: {'state': true, 'weight': 1.0, 'dp_pow': 0.5} # Amplitude noise model for typical dataset (dose-sufficient) under the maximum-likelihood formalism
    loss_sparse: {'state': true, 'weight': 0.1, 'ln_order': 1} # L_n norm sparsity regularization calculated for object phase ('objp')

constraint_params:
    obj_zblur     : {'start_iter': 1,    'step': 1, 'end_iter': null, 'obj_type': 'both', 'kernel_size': 5, 'std': 1} # Apply a "z-direction" 1D Gaussian blur to the object.
    
    ## NOTE: After padding vacuum, it's also suggested to turn on obj_z_recenter constraint to make sure the object remains centered along depth.
    ##       Because the object depth location is coupled with probe defocus, so if the probe defocus is constantly changing, the object would also move along depth.
    ##       This constraint will keep the object 1D-center-of-mass along depth to be centered, and adjust the probe defocus accordingly.
    obj_z_recenter: {'start_iter': 1,    'step': 1, 'end_iter': null, 'thresh': 95, 'scale': 0.5, 'max_shift': 1} # Apply the z-recentering of object based on CoM to keep the object centered within the depth dimension.
    
    objp_postiv   : {'start_iter': 1,    'step': 1, 'end_iter': null, 'relax': 0} # Apply a positivity constraint of the object phase by clipping negative values

recon_params:
    NITER: 200 # Total number of reconstruction iterations. 1 iteration means a full pass of all selected diffraction patterns.
    BATCH_SIZE: {'size': 32, 'grad_accumulation': 1} # Number of diffraction patterns processed simultaneously to get the gradient update.
    SAVE_ITERS: 10 # Number of completed iterations before saving the current reconstruction results (model, probe, object) and summary figures.
    output_dir: 'output/tBL_WSe2/'
    recon_dir_affixes: ['minimal', 'constraint', 'loss'] # Customizable affixes of reconstruction folder name with presets like 'minimal', 'default', 'all'. See docs for 19 more detailed controls.
    prefix: '' # Prefix this string to the reconstruction folder name. Note that a "_" will be automatically generated.
    postfix: '' # Postfix this string to the reconstruction folder name. Note that a "_" will be automatically generated.